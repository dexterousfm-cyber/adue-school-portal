<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Portal — ADUE International Schools</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
/* ═══════════════════════════════════════════════════════════
   ADUE INTERNATIONAL SCHOOLS — Global Stylesheet
   Matches exact design from screenshots
═══════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

:root {
  --sidebar-bg:   #7B0000;
  --sidebar-dark: #4A0000;
  --topbar-bg:    #8B0000;
  --active-bg:    #A00000;
  --red-btn:      #8B0000;
  --green-btn:    #28a745;
  --white:        #ffffff;
  --light-bg:     #f4f4f4;
  --card-border:  #8B0000;
  --text-dark:    #222222;
  --text-muted:   #666666;
  --text-red:     #8B0000;
  --border:       #dddddd;
  --table-head:   #8B0000;
  --danger:       #dc3545;
  --warning:      #ffc107;
  --success:      #28a745;
  --sidebar-w:    185px;
  --topbar-h:     54px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--light-bg);
  color: var(--text-dark);
  font-size: 13px;
}
a { text-decoration: none; color: inherit; }
button { font-family: 'Poppins', sans-serif; cursor: pointer; }
input, select, textarea { font-family: 'Poppins', sans-serif; }

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--topbar-bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px 0 0;
  z-index: 300;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.topbar-brand {
  width: var(--sidebar-w);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  flex-shrink: 0;
}
.topbar-brand .logo-box {
  width: 36px; height: 36px;
  background: var(--white);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.topbar-brand .brand-text {
  font-size: 13px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}
.topbar-brand .brand-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.65);
  font-weight: 400;
}
.topbar-center {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  padding-left: 20px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-admin {
  text-align: right;
}
.topbar-admin .admin-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.2;
}
.topbar-admin .admin-role {
  font-size: 10px;
  color: rgba(255,255,255,0.65);
}
.btn-logout {
  padding: 6px 14px;
  background: var(--danger);
  border: none;
  border-radius: 4px;
  color: var(--white);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-logout:hover { opacity: 0.85; }

/* ── LAYOUT ──────────────────────────────────────────────── */
.layout {
  display: flex;
  padding-top: var(--topbar-h);
  min-height: 100vh;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-height: calc(100vh - var(--topbar-h));
  background: linear-gradient(180deg, var(--sidebar-bg) 0%, var(--sidebar-dark) 100%);
  position: fixed;
  top: var(--topbar-h);
  left: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 200;
}
.sidebar nav {
  padding: 10px 0;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 11px 18px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.82);
  font-size: 13px;
  font-weight: 400;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  border-left: 3px solid transparent;
}
.nav-item:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.nav-item.active {
  background: var(--active-bg);
  color: #fff;
  font-weight: 600;
  border-left-color: #fff;
}
.nav-icon { font-size: 16px; width: 20px; text-align: center; }

/* ── MAIN CONTENT ────────────────────────────────────────── */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 24px 22px;
  min-height: calc(100vh - var(--topbar-h));
  background: var(--light-bg);
}

/* ── PAGE HEADER ─────────────────────────────────────────── */
.page-header {
  margin-bottom: 20px;
}
.back-link {
  font-size: 12px;
  color: var(--text-muted);
  display: inline-block;
  margin-bottom: 6px;
  cursor: pointer;
  text-decoration: none;
}
.back-link:hover { color: var(--text-red); }
.page-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-red);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── STAT CARDS ──────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 22px;
}
.stat-card {
  background: var(--white);
  border-radius: 8px;
  padding: 18px 16px;
  border-top: 3px solid var(--card-border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.stat-card .stat-val {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-red);
  line-height: 1.1;
}
.stat-card .stat-lbl {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-card.green { border-top-color: var(--success); }
.stat-card.green .stat-val { color: var(--success); }
.stat-card.blue  { border-top-color: #007bff; }
.stat-card.blue  .stat-val { color: #007bff; }
.stat-card.gold  { border-top-color: #e6a817; }
.stat-card.gold  .stat-val { color: #b07d00; }

/* ── CARDS ───────────────────────────────────────────────── */
.card {
  background: var(--white);
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  margin-bottom: 20px;
  overflow: hidden;
}
.card-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.card-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  display: flex;
  align-items: center;
  gap: 6px;
  border-left: 3px solid var(--text-red);
  padding-left: 10px;
}
.card-body { padding: 18px; }

/* ── SECTION TITLE ───────────────────────────────────────── */
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── TABLE ───────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
thead tr {
  background: var(--table-head);
}
th {
  padding: 10px 14px;
  text-align: left;
  color: var(--white);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
td {
  padding: 10px 14px;
  border-bottom: 1px solid #f0f0f0;
  color: var(--text-dark);
  vertical-align: middle;
}
tbody tr:hover { background: #fef5f5; }
tbody tr:last-child td { border-bottom: none; }
.td-muted { color: var(--text-muted); font-size: 11px; }
.no-data {
  text-align: center;
  padding: 32px;
  color: var(--text-muted);
  font-size: 13px;
}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 16px;
  border-radius: 4px;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn:hover { opacity: 0.88; }
.btn-red   { background: var(--red-btn);   color: var(--white); }
.btn-green { background: var(--green-btn); color: var(--white); }
.btn-gray  { background: #e0e0e0; color: #444; }
.btn-danger-soft { background: #fde8e8; color: var(--danger); border: 1px solid #f5c6c6; }
.btn-danger-soft:hover { background: #f5c6c6; }
.btn-edit-soft { background: #eaf0fb; color: #1a5276; border: 1px solid #c5d8f0; }
.btn-edit-soft:hover { background: #c5d8f0; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-block { width: 100%; justify-content: center; padding: 11px; font-size: 13px; }

/* ── QUICK ACTIONS ───────────────────────────────────────── */
.quick-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.quick-actions span {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-red);
  border-left: 3px solid var(--text-red);
  padding-left: 10px;
}

/* ── FORM ────────────────────────────────────────────────── */
.form-section {
  background: var(--white);
  border-radius: 8px;
  padding: 22px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.form-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-grid.cols-1 { grid-template-columns: 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dark);
}
.form-group label .req { color: var(--danger); margin-left: 2px; }
.form-control {
  width: 100%;
  padding: 8px 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-dark);
  background: var(--white);
  outline: none;
  transition: border 0.2s;
}
.form-control:focus { border-color: var(--card-border); }
.form-control::placeholder { color: #bbb; }
.form-hint {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}
textarea.form-control { resize: vertical; min-height: 80px; }

/* ── PILL / BADGE ────────────────────────────────────────── */
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.pill-green  { background: #d4edda; color: #155724; }
.pill-red    { background: #fde8e8; color: #721c24; }
.pill-yellow { background: #fff3cd; color: #856404; }
.pill-blue   { background: #cce5ff; color: #004085; }
.pill-gray   { background: #e9ecef; color: #495057; }

.grade-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}
.g-A { background: #d4edda; color: #155724; }
.g-B { background: #cce5ff; color: #004085; }
.g-C { background: #fff3cd; color: #856404; }
.g-D { background: #ffe5cc; color: #7d4000; }
.g-F { background: #fde8e8; color: #721c24; }

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 600;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--white);
  border-radius: 8px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  max-height: 90vh;
  overflow-y: auto;
  animation: fadeUp 0.2s ease;
  border-top: 4px solid var(--card-border);
}
.modal-box.wide { max-width: 640px; }
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.modal-header h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-red);
}
.modal-close {
  background: none;
  border: none;
  font-size: 20px;
  color: var(--text-muted);
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
}
.modal-close:hover { background: #f0f0f0; }

/* ── ALERT ───────────────────────────────────────────────── */
.alert {
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 12px;
  margin-bottom: 14px;
  display: none;
}
.alert.show { display: block; }
.alert-success { background: #d4edda; color: #155724; border-left: 3px solid #28a745; }
.alert-danger  { background: #fde8e8; color: #721c24; border-left: 3px solid #dc3545; }
.alert-info    { background: #cce5ff; color: #004085; border-left: 3px solid #007bff; }

/* ── TOAST ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: #333;
  color: #fff;
  padding: 11px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  max-width: 300px;
  animation: fadeUp 0.3s ease;
}
#toast.success { background: var(--success); }
#toast.error   { background: var(--danger); }

/* ── SETUP SCREEN ────────────────────────────────────────── */
#setup-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--sidebar-bg), var(--sidebar-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.setup-card {
  background: var(--white);
  border-radius: 10px;
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  border-top: 5px solid var(--card-border);
  animation: fadeUp 0.4s ease;
}
.setup-logo {
  text-align: center;
  margin-bottom: 28px;
}
.setup-logo .logo-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.setup-logo h2 { font-size: 22px; font-weight: 700; color: var(--text-red); }
.setup-logo p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ── LOGIN SCREEN ────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--sidebar-bg), var(--sidebar-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--white);
  border-radius: 10px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  border-top: 5px solid var(--card-border);
  animation: fadeUp 0.4s ease;
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo .logo-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.login-logo h2 { font-size: 22px; font-weight: 700; color: var(--text-red); }
.login-logo p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.login-title   { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 20px; text-align: center; }
#login-err, #setup-err {
  font-size: 12px;
  color: var(--danger);
  text-align: center;
  min-height: 18px;
  margin-bottom: 10px;
  font-weight: 500;
}
.input-eye { position: relative; }
.input-eye .form-control { padding-right: 38px; }
.eye-btn {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; font-size: 15px; color: var(--text-muted);
}
.eye-btn:hover { color: var(--text-red); }

/* ── SCORE BAR ───────────────────────────────────────────── */
.score-bar { display: flex; align-items: center; gap: 7px; }
.bar-track  { width: 60px; height: 5px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
.bar-fill   { height: 100%; border-radius: 3px; }

/* ── ATTENDANCE BUTTONS ──────────────────────────────────── */
.att-btns { display: flex; gap: 4px; }
.att-btn {
  padding: 3px 9px; border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent; cursor: pointer;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  transition: all 0.15s;
}
.att-btn.active-present { background: #d4edda; color: #155724; border-color: #b1dfbb; }
.att-btn.active-absent  { background: #fde8e8; color: #721c24; border-color: #f5c6c6; }
.att-btn.active-late    { background: #fff3cd; color: #856404; border-color: #ffe69c; }

/* ── PHOTO UPLOAD ────────────────────────────────────────── */
.photo-upload {
  border: 2px dashed var(--border);
  border-radius: 6px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  transition: border-color 0.2s;
}
.photo-upload:hover { border-color: var(--card-border); color: var(--text-red); }
.photo-preview {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--card-border);
  display: block; margin: 0 auto 8px;
}

/* ── SETTINGS ────────────────────────────────────────────── */
.settings-block {
  background: var(--white);
  border-radius: 8px;
  padding: 22px;
  margin-bottom: 18px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  max-width: 520px;
}
.settings-block h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-red);
  margin-bottom: 4px;
}
.settings-block p {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid #f0f0f0;
}

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}
.fade-in { animation: fadeUp 0.35s ease; }

/* ── UTILITIES ───────────────────────────────────────────── */
.text-red    { color: var(--text-red); }
.text-muted  { color: var(--text-muted); }
.text-center { text-align: center; }
.fw-600      { font-weight: 600; }
.flex        { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-8       { gap: 8px; }
.gap-10      { gap: 10px; }
.mt-10       { margin-top: 10px; }
.mt-16       { margin-top: 16px; }
.mb-16       { margin-bottom: 16px; }
.naira::before { content: '₦'; }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar { transform: translateX(-185px); width: 185px; transition: transform 0.3s; }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; padding: 16px 14px; }
  .topbar-brand { width: auto; }
  .topbar-center { display: none; }
  .form-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .menu-toggle { display: flex !important; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; }
  .sidebar-overlay.open { display: block; }
}
.menu-toggle {
  display: none;
  background: transparent;
  border: none;
  color: var(--white);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
}

  /* NAV */
  .t-nav { display:flex; flex-direction:column; padding:10px 0; }
  .t-nav a {
    display:flex; align-items:center; gap:10px;
    padding:11px 16px; color:rgba(255,255,255,0.7);
    font-size:13px; font-weight:500; text-decoration:none;
    border-left:3px solid transparent; transition:all 0.15s;
    cursor:pointer;
  }
  .t-nav a:hover { background:rgba(255,255,255,0.08); color:#fff; }

<script>
/* ── SUPABASE ── */
const sb = supabase.createClient('https://qdahibkdpkleapgravje.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkYWhpYmtkcGtsZWFwZ3JhdmplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTMyNjYsImV4cCI6MjA4OTg2OTI2Nn0.LfBRHV75e4_19afVc35NX4VD2pQBQ1GDF-48Y83JgPk');

/* ── HELPERS ── */
const naira = n => '₦' + Number(n||0).toLocaleString();
const today = () => new Date().toISOString().split('T')[0];
const grade = s => { s=Number(s); if(s>=80)return'A';if(s>=65)return'B';if(s>=50)return'C';if(s>=40)return'D';return'F'; };
const gradeColor = g => ({A:'#28a745',B:'#007bff',C:'#ffc107',D:'#fd7e14',F:'#dc3545'})[g]||'#888';
const remark = s => s>=80?'Excellent':s>=65?'Good':s>=50?'Average':s>=40?'Below Average':'Poor';
const fmt = d => { if(!d)return'—'; try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;} };
const pillHtml = (s,col,bg) => `<span style="background:${bg};color:${col};padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;">${s}</span>`;
function statusPill(s) {
  const m = {Active:['#155724','#d4edda'],Present:['#155724','#d4edda'],Paid:['#155724','#d4edda'],Absent:['#721c24','#fde8e8'],Inactive:['#721c24','#fde8e8'],Unpaid:['#721c24','#fde8e8'],Late:['#856404','#fff3cd'],Partial:['#856404','#fff3cd']};
  const [c,b] = m[s]||['#495057','#e9ecef'];
  return pillHtml(s,c,b);
}
function gradeBadge(g) {
  const m = {A:['#155724','#d4edda'],B:['#004085','#cce5ff'],C:['#856404','#fff3cd'],D:['#7d4000','#ffe5cc'],F:['#721c24','#fde8e8']};
  const [c,b] = m[g]||['#495057','#e9ecef'];
  return pillHtml(g,c,b);
}
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='ok'?'#28a745':'#dc3545';
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.style.display='none', 3000);
}
function openModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });
function empty(icon, msg) { return `<div style="text-align:center;padding:40px;color:#666"><div style="font-size:40px;margin-bottom:10px">${icon}</div><p>${msg}</p></div>`; }

/* ── AUTH CHECK ── */
const RAW = sessionStorage.getItem('adue_session');
if(!RAW) { window.location.href='index.html'; }
let SESSION;
try { SESSION = JSON.parse(RAW); } catch(e) { window.location.href='index.html'; }
if(!SESSION || SESSION.role !== 'teacher') { window.location.href='index.html'; }

/* ── LOGOUT ── */
function logout() {
  sessionStorage.removeItem('adue_session');
  window.location.href = 'index.html';
}

/* ── SIDEBAR TOGGLE ── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

/* ── NAV ── */
let currentPage = 'dashboard';
function show(page) {
  // Hide all pages
  document.querySelectorAll('[id^="page-"]').forEach(d => d.style.display='none');
  document.getElementById('page-'+page).style.display = '';
  // Update nav active
  document.querySelectorAll('.t-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  currentPage = page;
  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
  // Render page
  const pages = {
    dashboard: renderDashboard,
    myclass:   renderMyClass,
    attendance: renderAttendance,
    grades:    renderGrades,
    register:  renderRegister,
    notices:   renderNotices,
    profile:   renderProfile,
  };
  if(pages[page]) pages[page]();
}

/* ── TEACHER DATA ── */
let ME = null;
let myStudents = [];
let attDate = today();

async function loadMe() {
  const { data, error } = await sb.from('teachers').select('*').eq('id', SESSION.id).single();
  if(error || !data) {
    // Session id might not match — try by portal_username
    const { data: d2 } = await sb.from('teachers').select('*').eq('portal_username', SESSION.username).single();
    ME = d2;
  } else {
    ME = data;
  }

  if(!ME) {
    document.getElementById('hdr-name').textContent = SESSION.full_name || 'Teacher';
    document.getElementById('hdr-role').textContent = 'Teacher';
    document.getElementById('side-name').textContent = SESSION.full_name || 'Teacher';
  } else {
    document.getElementById('hdr-name').textContent = ME.first_name + ' ' + ME.last_name;
    document.getElementById('hdr-role').textContent = ME.role + (ME.assigned_class ? ' — ' + ME.assigned_class : '');
    document.getElementById('side-name').textContent = ME.first_name + ' ' + ME.last_name;
    // Load my class students
    if(ME.assigned_class) {
      const { data: stu } = await sb.from('students').select('*').eq('class', ME.assigned_class).order('first_name');
      myStudents = stu || [];
    }
  }

  // Render dashboard after loading
  renderDashboard();
}

/* ══ DASHBOARD ══════════════════════════════════════════════ */
async function renderDashboard() {
  const myClass = ME?.assigned_class || '';
  const el = document.getElementById('page-dashboard');
  el.innerHTML = `<div style="text-align:center;padding:40px;color:#666">Loading dashboard…</div>`;

  const [gRes, aRes, nRes] = await Promise.all([
    myClass ? sb.from('grades').select('score,subject,term,grade,student_name').eq('class', myClass) : Promise.resolve({data:[]}),
    myClass ? sb.from('attendance').select('status').eq('class', myClass).eq('date', today()) : Promise.resolve({data:[]}),
    sb.from('notices').select('title,priority,date').order('created_at',{ascending:false}).limit(5),
  ]);

  const grades  = gRes.data || [];

async function markOne(stuId, stuName, status) {
  const myClass = ME?.assigned_class||'';
  const { error } = await sb.from('attendance').upsert(
    { student_id:stuId, student_name:stuName, class:myClass, date:attDate, status },
    { onConflict:'student_id,date' }
  );
  if(error) { toast('Error: '+error.message, 'err'); return; }
  myAtt = myAtt.filter(a=>a.student_id!==stuId);
  myAtt.push({ student_id:stuId, student_name:stuName, class:myClass, date:attDate, status });
  renderAttendance();
}

async function markAll(status) {
  const myClass = ME?.assigned_class||'';
  if(!myStudents.length) { toast('No students in class.','err'); return; }
  const records = myStudents.map(s=>({ student_id:s.id, student_name:s.first_name+' '+s.last_name, class:myClass, date:attDate, status }));
  const { error } = await sb.from('attendance').upsert(records, { onConflict:'student_id,date' });
  if(error) { toast('Error: '+error.message,'err'); return; }
  toast('All marked as '+status, 'ok');
  renderAttendance();
}

async function saveGrade() {
  const stuSel = document.getElementById('mg-stu');
  const stuId  = stuSel.value;
  const sub    = document.getElementById('mg-sub').value;
  const term   = document.getElementById('mg-term').value;
  const ses    = document.getElementById('mg-ses').value;
  const score  = Number(document.getElementById('mg-score').value);
  if(!stuId) { toast('Select a student.','err'); return; }
  if(!sub)   { toast('Select a subject.','err'); return; }
  if(!term)  { toast('Select a term.','err'); return; }
  if(isNaN(score)||score<0||score>100) { toast('Score must be 0–100.','err'); return; }
  const opt = stuSel.options[stuSel.selectedIndex];
  const { error } = await sb.from('grades').insert([{
    student_id:   stuId,
    student_name: opt.getAttribute('data-name'),
    student_code: opt.getAttribute('data-sid'),
    class:        opt.getAttribute('data-cls'),
    subject: sub, term, session: ses, score,
    grade: grade(score), date_added: today()
  }]);
  if(error) { toast('Error: '+error.message,'err'); return; }
  toast('Grade saved!','ok');
  closeModal();
  renderGrades();
}

async function deleteGrade(id) {
  if(!confirm('Delete this grade record?')) return;
  await sb.from('grades').delete().eq('id',id);
  toast('Deleted.','err');
  renderGrades();
}

          <thead><tr><th>#</th><th>Name</th><th>Student ID</th><th>Class</th><th>Date</th></tr></thead>
          <tbody>
            ${rl.length===0
              ? '<tr><td colspan="5" class="no-data">No students registered yet.</td></tr>'
              : rl.map((s,i)=>`<tr>
                  <td style="color:#666;font-size:12px">${i+1}</td>
                  <td><strong>${s.first_name} ${s.last_name}</strong></td>
                  <td style="color:#666;font-size:12px">${s.student_id}</td>
                  <td>${s.class}</td>
                  <td style="color:#666;font-size:12px">${s.date_registered||'—'}</td>
                </tr>`).join('')
            }
          </tbody>
        </table>
      </div>
    </div>`;
}

function rfCheckDept() {
  const cls  = document.getElementById('rf-class')?.value;
  const wrap = document.getElementById('rf-dept-wrap');
  if(wrap) wrap.style.display = ['Year 10','Year 11','Year 12'].includes(cls)?'':'none';
}

async function saveRegStudent() {
  const fname  = document.getElementById('rf-fname').value.trim();
  const lname  = document.getElementById('rf-lname').value.trim();
  const cls    = document.getElementById('rf-class').value;
  const gender = document.getElementById('rf-gender').value;
  const pname  = document.getElementById('rf-pname').value.trim();
  const pphone = document.getElementById('rf-pphone').value.trim();
  const puser  = document.getElementById('rf-puser').value.trim();
  const ppass  = document.getElementById('rf-ppass').value;
  const dept   = document.getElementById('rf-dept')?.value||'';

  if(!fname)  { toast('First name required.','err'); return; }
  if(!lname)  { toast('Last name required.','err'); return; }
  if(!cls)    { toast('Select a class.','err'); return; }
  if(!gender) { toast('Select gender.','err'); return; }
  if(!pname)  { toast('Parent name required.','err'); return; }
  if(!pphone) { toast('Parent phone required.','err'); return; }
  if(!puser)  { toast('Portal username required.','err'); return; }
  if(!ppass)  { toast('Portal password required.','err'); return; }
  if(ppass.length<6) { toast('Password must be at least 6 characters.','err'); return; }
  if(['Year 10','Year 11','Year 12'].includes(cls)&&!dept) { toast('Select a department.','err'); return; }

  let sid = document.getElementById('rf-sid').value.trim();
  if(!sid) {
    const { count } = await sb.from('students').select('*',{count:'exact',head:true});
    sid = 'AIS/STU/'+String((count||0)+1).padStart(4,'0');
  }

  const { error } = await sb.from('students').insert([{
    first_name: fname, last_name: lname, student_id: sid,
    class: cls, gender, department: dept||null,
    dob:   document.getElementById('rf-dob').value||null,
    email: document.getElementById('rf-email').value.trim()||null,
    phone: document.getElementById('rf-phone').value.trim()||null,
    parent_name: pname, parent_phone: pphone,
    address: document.getElementById('rf-address').value.trim()||null,
    status: 'Active', portal_username: puser, portal_password: ppass,
    date_registered: today(),
  }]);

  if(error) { toast('Error: '+error.message,'err'); return; }
  toast('Student registered successfully!','ok');
  clearRegForm();
  renderRegister();
}

function clearRegForm() {
  ['rf-fname','rf-lname','rf-sid','rf-email','rf-phone','rf-pname','rf-pphone','rf-address','rf-puser','rf-ppass','rf-dob'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  ['rf-class','rf-gender','rf-dept'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const w=document.getElementById('rf-dept-wrap'); if(w) w.style.display='none';
}

/* ══ NOTICES ═══════════════════════════════════════════════ */
async function renderNotices() {
  const { data } = await sb.from('notices').select('*').order('created_at',{ascending:false});
  const nl = data||[];
  const el = document.getElementById('page-notices');
  el.innerHTML = `
    <div class="page-header"><div class="page-title">📢 Notices</div></div>
    <div class="card card-body" style="padding:0">
      ${nl.length===0 ? empty('📢','No notices yet.') : nl.map(n=>`
          <div style="padding:16px;border-bottom:1px solid #f5f5f5;border-left:4px solid ${n.priority==='High'?'#dc3545':n.priority==='Low'?'#007bff':'#ffc107'}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <strong style="font-size:14px">${n.title}</strong>
              ${statusPill(n.priority)}
            </div>
            <div style="font-size:11px;color:#666;margin-bottom:6px">📅 ${n.date} &nbsp;·&nbsp; 👤 ${n.author||'Admin'}</div>
            <div style="font-size:13px;color:#444;line-height:1.6">${n.body}</div>
          </div>`).join('')
      }
    </div>`;
}
