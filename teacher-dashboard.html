<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Portal — ADUE International Schools</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
/* ═══════════════════════════════════════════════════════════
   ADUE INTERNATIONAL SCHOOLS — Global Stylesheet
   Matches exact design from screenshots
═══════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

:root {
  --sidebar-bg:   #7B0000;
  --sidebar-dark: #4A0000;
  --topbar-bg:    #8B0000;
  --active-bg:    #A00000;
  --red-btn:      #8B0000;
  --green-btn:    #28a745;
  --white:        #ffffff;
  --light-bg:     #f4f4f4;
  --card-border:  #8B0000;
  --text-dark:    #222222;
  --text-muted:   #666666;
  --text-red:     #8B0000;
  --border:       #dddddd;
  --table-head:   #8B0000;
  --danger:       #dc3545;
  --warning:      #ffc107;
  --success:      #28a745;
  --sidebar-w:    185px;
  --topbar-h:     54px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--light-bg);
  color: var(--text-dark);
  font-size: 13px;
}
a { text-decoration: none; color: inherit; }
button { font-family: 'Poppins', sans-serif; cursor: pointer; }
input, select, textarea { font-family: 'Poppins', sans-serif; }

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--topbar-bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px 0 0;
  z-index: 300;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.topbar-brand {
  width: var(--sidebar-w);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  flex-shrink: 0;
}
.topbar-brand .logo-box {
  width: 36px; height: 36px;
  background: var(--white);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.topbar-brand .brand-text {
  font-size: 13px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}
.topbar-brand .brand-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.65);
  font-weight: 400;
}
.topbar-center {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  padding-left: 20px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-admin {
  text-align: right;
}
.topbar-admin .admin-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.2;
}
.topbar-admin .admin-role {
  font-size: 10px;
  color: rgba(255,255,255,0.65);
}
.btn-logout {
  padding: 6px 14px;
  background: var(--danger);
  border: none;
  border-radius: 4px;
  color: var(--white);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-logout:hover { opacity: 0.85; }

/* ── LAYOUT ──────────────────────────────────────────────── */
.layout {
  display: flex;
  padding-top: var(--topbar-h);
  min-height: 100vh;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-height: calc(100vh - var(--topbar-h));
  background: linear-gradient(180deg, var(--sidebar-bg) 0%, var(--sidebar-dark) 100%);
  position: fixed;
  top: var(--topbar-h);
  left: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 200;
}
.sidebar nav {
  padding: 10px 0;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 11px 18px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.82);
  font-size: 13px;
  font-weight: 400;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  border-left: 3px solid transparent;
}
.nav-item:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.nav-item.active {
  background: var(--active-bg);
  color: #fff;
  font-weight: 600;
  border-left-color: #fff;
}
.nav-icon { font-size: 16px; width: 20px; text-align: center; }

/* ── MAIN CONTENT ────────────────────────────────────────── */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 24px 22px;
  min-height: calc(100vh - var(--topbar-h));
  background: var(--light-bg);
}

/* ── PAGE HEADER ─────────────────────────────────────────── */
.page-header {
  margin-bottom: 20px;
}
.back-link {
  font-size: 12px;
  color: var(--text-muted);
  display: inline-block;
  margin-bottom: 6px;
  cursor: pointer;
  text-decoration: none;
}
.back-link:hover { color: var(--text-red); }
.page-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-red);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── STAT CARDS ──────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 22px;
}
.stat-card {
  background: var(--white);
  border-radius: 8px;
  padding: 18px 16px;
  border-top: 3px solid var(--card-border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.stat-card .stat-val {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-red);
  line-height: 1.1;
}
.stat-card .stat-lbl {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-card.green { border-top-color: var(--success); }
.stat-card.green .stat-val { color: var(--success); }
.stat-card.blue  { border-top-color: #007bff; }
.stat-card.blue  .stat-val { color: #007bff; }
.stat-card.gold  { border-top-color: #e6a817; }
.stat-card.gold  .stat-val { color: #b07d00; }

/* ── CARDS ───────────────────────────────────────────────── */
.card {
  background: var(--white);
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  margin-bottom: 20px;
  overflow: hidden;
}
.card-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.card-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  display: flex;
  align-items: center;
  gap: 6px;
  border-left: 3px solid var(--text-red);
  padding-left: 10px;
}
.card-body { padding: 18px; }

/* ── SECTION TITLE ───────────────────────────────────────── */
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── TABLE ───────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
thead tr {
  background: var(--table-head);
}
th {
  padding: 10px 14px;
  text-align: left;
  color: var(--white);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
td {
  padding: 10px 14px;
  border-bottom: 1px solid #f0f0f0;
  color: var(--text-dark);
  vertical-align: middle;
}
tbody tr:hover { background: #fef5f5; }
tbody tr:last-child td { border-bottom: none; }
.td-muted { color: var(--text-muted); font-size: 11px; }
.no-data {
  text-align: center;
  padding: 32px;
  color: var(--text-muted);
  font-size: 13px;
}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 16px;
  border-radius: 4px;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn:hover { opacity: 0.88; }
.btn-red   { background: var(--red-btn);   color: var(--white); }
.btn-green { background: var(--green-btn); color: var(--white); }
.btn-gray  { background: #e0e0e0; color: #444; }
.btn-danger-soft { background: #fde8e8; color: var(--danger); border: 1px solid #f5c6c6; }
.btn-danger-soft:hover { background: #f5c6c6; }
.btn-edit-soft { background: #eaf0fb; color: #1a5276; border: 1px solid #c5d8f0; }
.btn-edit-soft:hover { background: #c5d8f0; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-block { width: 100%; justify-content: center; padding: 11px; font-size: 13px; }

/* ── QUICK ACTIONS ───────────────────────────────────────── */
.quick-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.quick-actions span {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-red);
  border-left: 3px solid var(--text-red);
  padding-left: 10px;
}

/* ── FORM ────────────────────────────────────────────────── */
.form-section {
  background: var(--white);
  border-radius: 8px;
  padding: 22px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.form-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-grid.cols-1 { grid-template-columns: 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dark);
}
.form-group label .req { color: var(--danger); margin-left: 2px; }
.form-control {
  width: 100%;
  padding: 8px 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-dark);
  background: var(--white);
  outline: none;
  transition: border 0.2s;
}
.form-control:focus { border-color: var(--card-border); }
.form-control::placeholder { color: #bbb; }
.form-hint {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}
textarea.form-control { resize: vertical; min-height: 80px; }

/* ── PILL / BADGE ────────────────────────────────────────── */
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.pill-green  { background: #d4edda; color: #155724; }
.pill-red    { background: #fde8e8; color: #721c24; }
.pill-yellow { background: #fff3cd; color: #856404; }
.pill-blue   { background: #cce5ff; color: #004085; }
.pill-gray   { background: #e9ecef; color: #495057; }

.grade-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}
.g-A { background: #d4edda; color: #155724; }
.g-B { background: #cce5ff; color: #004085; }
.g-C { background: #fff3cd; color: #856404; }
.g-D { background: #ffe5cc; color: #7d4000; }
.g-F { background: #fde8e8; color: #721c24; }

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 600;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--white);
  border-radius: 8px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  max-height: 90vh;
  overflow-y: auto;
  animation: fadeUp 0.2s ease;
  border-top: 4px solid var(--card-border);
}
.modal-box.wide { max-width: 640px; }
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.modal-header h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-red);
}
.modal-close {
  background: none;
  border: none;
  font-size: 20px;
  color: var(--text-muted);
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
}
.modal-close:hover { background: #f0f0f0; }

/* ── ALERT ───────────────────────────────────────────────── */
.alert {
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 12px;
  margin-bottom: 14px;
  display: none;
}
.alert.show { display: block; }
.alert-success { background: #d4edda; color: #155724; border-left: 3px solid #28a745; }
.alert-danger  { background: #fde8e8; color: #721c24; border-left: 3px solid #dc3545; }
.alert-info    { background: #cce5ff; color: #004085; border-left: 3px solid #007bff; }

/* ── TOAST ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: #333;
  color: #fff;
  padding: 11px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  max-width: 300px;
  animation: fadeUp 0.3s ease;
}
#toast.success { background: var(--success); }
#toast.error   { background: var(--danger); }

/* ── SETUP SCREEN ────────────────────────────────────────── */
#setup-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--sidebar-bg), var(--sidebar-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.setup-card {
  background: var(--white);
  border-radius: 10px;
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  border-top: 5px solid var(--card-border);
  animation: fadeUp 0.4s ease;
}
.setup-logo {
  text-align: center;
  margin-bottom: 28px;
}
.setup-logo .logo-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.setup-logo h2 { font-size: 22px; font-weight: 700; color: var(--text-red); }
.setup-logo p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ── LOGIN SCREEN ────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--sidebar-bg), var(--sidebar-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--white);
  border-radius: 10px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  border-top: 5px solid var(--card-border);
  animation: fadeUp 0.4s ease;
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo .logo-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.login-logo h2 { font-size: 22px; font-weight: 700; color: var(--text-red); }
.login-logo p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.login-title   { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 20px; text-align: center; }
#login-err, #setup-err {
  font-size: 12px;
  color: var(--danger);
  text-align: center;
  min-height: 18px;
  margin-bottom: 10px;
  font-weight: 500;
}
.input-eye { position: relative; }
.input-eye .form-control { padding-right: 38px; }
.eye-btn {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; font-size: 15px; color: var(--text-muted);
}
.eye-btn:hover { color: var(--text-red); }

/* ── SCORE BAR ───────────────────────────────────────────── */
.score-bar { display: flex; align-items: center; gap: 7px; }
.bar-track  { width: 60px; height: 5px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
.bar-fill   { height: 100%; border-radius: 3px; }

/* ── ATTENDANCE BUTTONS ──────────────────────────────────── */
.att-btns { display: flex; gap: 4px; }
.att-btn {
  padding: 3px 9px; border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent; cursor: pointer;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  transition: all 0.15s;
}
.att-btn.active-present { background: #d4edda; color: #155724; border-color: #b1dfbb; }
.att-btn.active-absent  { background: #fde8e8; color: #721c24; border-color: #f5c6c6; }
.att-btn.active-late    { background: #fff3cd; color: #856404; border-color: #ffe69c; }

/* ── PHOTO UPLOAD ────────────────────────────────────────── */
.photo-upload {
  border: 2px dashed var(--border);
  border-radius: 6px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  transition: border-color 0.2s;
}
.photo-upload:hover { border-color: var(--card-border); color: var(--text-red); }
.photo-preview {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--card-border);
  display: block; margin: 0 auto 8px;
}

/* ── SETTINGS ────────────────────────────────────────────── */
.settings-block {
  background: var(--white);
  border-radius: 8px;
  padding: 22px;
  margin-bottom: 18px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  max-width: 520px;
}
.settings-block h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-red);
  margin-bottom: 4px;
}
.settings-block p {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid #f0f0f0;
}

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}
.fade-in { animation: fadeUp 0.35s ease; }

/* ── UTILITIES ───────────────────────────────────────────── */
.text-red    { color: var(--text-red); }
.text-muted  { color: var(--text-muted); }
.text-center { text-align: center; }
.fw-600      { font-weight: 600; }
.flex        { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-8       { gap: 8px; }
.gap-10      { gap: 10px; }
.mt-10       { margin-top: 10px; }
.mt-16       { margin-top: 16px; }
.mb-16       { margin-bottom: 16px; }
.naira::before { content: '₦'; }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar { transform: translateX(-185px); width: 185px; transition: transform 0.3s; }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; padding: 16px 14px; }
  .topbar-brand { width: auto; }
  .topbar-center { display: none; }
  .form-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .menu-toggle { display: flex !important; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; }
  .sidebar-overlay.open { display: block; }
}
.menu-toggle {
  display: none;
  background: transparent;
  border: none;
  color: var(--white);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
}

  .att-row{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid #f5f5f5;gap:10px;flex-wrap:wrap;}
  .att-row:hover{background:#fdf5f5;}
  .att-row.mp{background:#f0fdf4;}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function naira(n){return '₦'+Number(n||0).toLocaleString();}
function scoreToGrade(s){s=Number(s);if(s>=80)return 'A';if(s>=65)return 'B';if(s>=50)return 'C';if(s>=40)return 'D';return 'F';}
function gradeBarColor(g){return {A:'#28a745',B:'#007bff',C:'#ffc107',D:'#fd7e14',F:'#dc3545'}[g]||'#888';}
function scoreRemark(s){if(s>=80)return 'Excellent';if(s>=65)return 'Good';if(s>=50)return 'Average';if(s>=40)return 'Below Average';return 'Poor';}
function todayDate(){return new Date().toISOString().split('T')[0];}
function formatDate(d){if(!d||d==='—')return '—';try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}}
function pillClass(s){const m={Active:'pill-green',Inactive:'pill-red','On Leave':'pill-yellow',Present:'pill-green',Absent:'pill-red',Late:'pill-yellow'};return 'pill '+(m[s]||'pill-gray');}
function pill(s){return `<span class="${pillClass(s)}">${s}</span>`;}
function gradeBadge(g){return `<span class="grade-badge g-${g}">${g}</span>`;}
function emptyState(icon,msg){return `<div class="empty-state"><div class="empty-icon">${icon}</div><p>${msg}</p></div>`;}
function toast(msg,type='default'){let el=document.getElementById('toast');el.textContent=msg;el.className=type==='success'?'success':type==='error'?'error':'';el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>{el.style.display='none';},3200);}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

/* ── AUTH ── */
const sessionData = sessionStorage.getItem('adue_session');
if(!sessionData){window.location.href='index.html';}
const ME_SESSION = JSON.parse(sessionData||'{}');
if(ME_SESSION.role!=='teacher'){window.location.href='index.html';}

let ME = null;
let myStudents = [];
let myAtt = [];

async function init() {
  // Load teacher data
  const {data} = await sb.from('teachers').select('*').eq('id', ME_SESSION.id).single();
  ME = data;
  if(!ME){window.location.href='index.html';return;}

  document.getElementById('t-name').textContent = ME.first_name+' '+ME.last_name;
  document.getElementById('t-role').textContent = ME.role+(ME.assigned_class?' — '+ME.assigned_class:'');
  document.getElementById('t-sidebar-name').textContent = ME.first_name+' '+ME.last_name;

  // Mobile menu
  document.getElementById('menu-toggle').addEventListener('click',()=>{
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  });
  document.getElementById('sidebar-overlay').addEventListener('click',()=>{
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  });

  // Load my class students
  if(ME.assigned_class) {
    const {data:stu} = await sb.from('students').select('*').eq('class',ME.assigned_class).order('first_name');
    myStudents = stu||[];
  }

  renderDashboard();
}

function doLogout() {
  sessionStorage.removeItem('adue_session');
  window.location.href = 'index.html';
}

/* ── SECTION SWITCHER ── */
function showSection(name, btn) {
  document.querySelectorAll('.main-content > div').forEach(d=>d.style.display='none');
  document.getElementById('sec-'+name).style.display='';
  document.querySelectorAll('.t-nav-item').forEach(n=>n.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const renders = {dashboard:renderDashboard,myclass:renderMyClass,attendance:renderAttendance,grades:renderGrades,notices:renderNotices,profile:renderProfile};
  renders[name]();
}

/* ══ DASHBOARD ══════════════════════════════════════════════ */
async function renderDashboard() {
  const myClass = ME?.assigned_class||'';
  const {data:grades} = await sb.from('grades').select('score,subject,term,grade,student_name').eq('class',myClass);
  const {data:todayAtt} = await sb.from('attendance').select('status').eq('class',myClass).eq('date',todayDate());
  const {data:notices} = await sb.from('notices').select('title,priority,date').order('created_at',{ascending:false}).limit(5);

  const avg = (grades||[]).length?Math.round((grades||[]).reduce((a,b)=>a+b.score,0)/(grades||[]).length):0;
  const present = (todayAtt||[]).filter(a=>a.status==='Present').length;

  document.getElementById('sec-dashboard').innerHTML = `
    <div class="page-header">
      <div class="page-title">🏠 Dashboard</div>
      <div style="font-size:12px;color:var(--muted)">Welcome back, ${ME.first_name}!</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${myStudents.length}</div><div class="stat-lbl">My Students${myClass?' ('+myClass+')':''}</div></div>
      <div class="stat-card green"><div class="stat-val">${present}</div><div class="stat-lbl">Present Today</div></div>
      <div class="stat-card blue"><div class="stat-val">${avg}%</div><div class="stat-lbl">Class Average</div></div>
      <div class="stat-card gold"><div class="stat-val">${(grades||[]).length}</div><div class="stat-lbl">Grade Records</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div class="card-header"><h3>👥 My Students</h3></div>
        <div class="card-body">
          ${myStudents.length===0
            ? emptyState('👥',myClass?'No students in '+myClass+' yet.':'You are not assigned to a class yet.')
            : myStudents.slice(0,6).map(s=>`
                <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5">
                  <div style="width:32px;height:32px;border-radius:50%;background:var(--wine);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0">${(s.first_name||'?')[0]}</div>
                  <div><div style="font-size:13px;font-weight:600">${s.first_name} ${s.last_name}</div><div style="font-size:11px;color:var(--muted)">${s.student_id}</div></div>
                  <div style="margin-left:auto">${pill(s.status)}</div>
                </div>`).join('')+(myStudents.length>6?`<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--muted)">+${myStudents.length-6} more</div>`:'')
          }
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>📢 Notices</h3></div>
        <div class="card-body">
          ${(notices||[]).length===0?emptyState('📢','No notices yet.')
            :(notices||[]).map(n=>`
              <div style="padding:9px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center">
                <div><div style="font-size:13px;font-weight:600">${n.title}</div><div style="font-size:11px;color:var(--muted)">${n.date}</div></div>
                ${pill(n.priority)}
              </div>`).join('')
          }
        </div>
      </div>
    </div>`;
}

/* ══ MY CLASS ══════════════════════════════════════════════ */
function renderMyClass() {
  const myClass = ME?.assigned_class||'';
  document.getElementById('sec-myclass').innerHTML = `
    <div class="page-header">
      <div class="page-title">👥 My Class${myClass?' — '+myClass:''}</div>
      <div style="font-size:12px;color:var(--muted)">${myStudents.length} student(s)</div>
    </div>
    ${!myClass
      ? `<div class="card card-body">${emptyState('📚','You are not assigned to a class. Contact admin.')}</div>`
      : `<div class="card">
          <div class="card-header"><h3>All Students in ${myClass}</h3></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Name</th><th>Student ID</th><th>Gender</th><th>Parent Phone</th><th>Status</th></tr></thead>
              <tbody>
                ${myStudents.length===0?'<tr><td colspan="6" class="no-data">No students yet.</td></tr>'
                  :myStudents.map((s,i)=>`<tr>
                    <td class="td-muted">${i+1}</td>
                    <td><strong>${s.first_name} ${s.last_name}</strong></td>
                    <td class="td-muted">${s.student_id}</td>
                    <td>${s.gender||'—'}</td>
                    <td>${s.parent_phone||'—'}</td>
                    <td>${pill(s.status)}</td>
                  </tr>`).join('')
                }
              </tbody>
            </table>
          </div>
        </div>`
    }`;
}

/* ══ ATTENDANCE ════════════════════════════════════════════ */

  document.getElementById('sec-attendance').innerHTML = `

    </div>
    ${!myClass
      ? `<div class="card card-body">${emptyState('📋','Not assigned to a class.')}</div>`

                <div>
                  <label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px">DATE</label>
                  <input class="form-control" type="date" id="t-att-date" value="${attDate}" style="width:160px" onchange="attDate=this.value;renderAttendance()"/>
                </div>
              </div>
              <div style="display:flex;gap:8px">
                <button class="btn btn-red" onclick="tMarkAll('Present')">✔ All Present</button>
                <button class="btn" style="background:#dc3545;color:#fff" onclick="tMarkAll('Absent')">✘ All Absent</button>
              </div>
            </div>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-card green"><div class="stat-val">${present}</div><div class="stat-lbl">Present</div></div>
          <div class="stat-card" style="border-top-color:#dc3545"><div class="stat-val" style="color:#dc3545">${absent}</div><div class="stat-lbl">Absent</div></div>
          <div class="stat-card gold"><div class="stat-val">${late}</div><div class="stat-lbl">Late</div></div>
          <div class="stat-card"><div class="stat-val">${myStudents.length-myAtt.length}</div><div class="stat-lbl">Unmarked</div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>${myClass} — ${attDate}</h3></div>
          ${myStudents.length===0?`<div class="card-body">${emptyState('👥','No students in this class.')}</div>`
            :myStudents.map((s,i)=>{
              const rec=myAtt.find(a=>a.student_id===s.id);
              const status=rec?.status||null;
              const rowCls=status==='Present'?'mp':status==='Absent'?'ma':status==='Late'?'ml':'';
              return `<div class="att-row ${rowCls}" id="trow-${s.id}">
                <div style="display:flex;align-items:center;gap:10px;flex:1">
                  <span style="font-size:12px;color:var(--muted);width:22px">${i+1}</span>
                  <div style="width:34px;height:34px;border-radius:50%;background:var(--wine);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">${(s.first_name||'?')[0]}</div>
                  <div>
                    <div style="font-weight:600;font-size:13px">${s.first_name} ${s.last_name}</div>
                    <div style="font-size:11px;color:var(--muted)">${s.student_id}</div>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                  ${status?`<span class="${pillClass(status)}">${status}</span>`:'<span style="font-size:11px;color:var(--muted)">Not marked</span>'}
                  <div class="att-btns">
                    <button class="att-btn${status==='Present'?' active-present':''}" onclick="tMarkOne('${s.id}','${s.first_name} ${s.last_name}','Present')">✔ Present</button>
                    <button class="att-btn${status==='Absent'?' active-absent':''}"  onclick="tMarkOne('${s.id}','${s.first_name} ${s.last_name}','Absent')">✘ Absent</button>
                    <button class="att-btn${status==='Late'?' active-late':''}"      onclick="tMarkOne('${s.id}','${s.first_name} ${s.last_name}','Late')">⏰ Late</button>
                  </div>
                </div>
              </div>`;
            }).join('')
          }
        </div>`
    }`;
}

async function tMarkOne(stuId, stuName, status) {
  const myClass=ME?.assigned_class||'';
  const {error}=await sb.from('attendance').upsert({student_id:stuId,student_name:stuName,class:myClass,date:attDate,status},{onConflict:'student_id,date'});
  if(error){toast('Error: '+error.message,'error');return;}
  myAtt=myAtt.filter(a=>a.student_id!==stuId);
  myAtt.push({student_id:stuId,student_name:stuName,class:myClass,date:attDate,status});
  const row=document.getElementById('trow-'+stuId);
  if(row){
    row.className='att-row '+(status==='Present'?'mp':status==='Absent'?'ma':'ml');
    row.querySelectorAll('.att-btn').forEach(b=>b.className='att-btn');
    const btns=row.querySelectorAll('.att-btn');
    if(status==='Present'&&btns[0])btns[0].className='att-btn active-present';
    if(status==='Absent'&&btns[1])btns[1].className='att-btn active-absent';
    if(status==='Late'&&btns[2])btns[2].className='att-btn active-late';
  }
}

async function tMarkAll(status) {
  const myClass=ME?.assigned_class||'';
  if(!myStudents.length){toast('No students.','error');return;}
  const records=myStudents.map(s=>({student_id:s.id,student_name:s.first_name+' '+s.last_name,class:myClass,date:attDate,status}));
  const {error}=await sb.from('attendance').upsert(records,{onConflict:'student_id,date'});
  if(error){toast('Error: '+error.message,'error');return;}
  toast('All marked as '+status,'success');
  renderAttendance();
}

/* ══ GRADES ════════════════════════════════════════════════ */
async function renderGrades() {
  const myClass=ME?.assigned_class||'';
  const {data:grades}=await sb.from('grades').select('*').eq('class',myClass).order('created_at',{ascending:false});
  const gl=grades||[];

  document.getElementById('sec-grades').innerHTML=`
    <div class="page-header">
      <div class="page-title">📝 Grades — ${myClass||'No Class'}</div>
      <div style="font-size:12px;color:var(--muted)">${gl.length} records</div>
    </div>
    ${!myClass?`<div class="card card-body">${emptyState('📝','Not assigned to a class.')}</div>`:`
      <div class="card" style="margin-bottom:16px">
        <div class="card-body" style="padding:14px 18px;display:flex;justify-content:flex-end">
          <button class="btn btn-red" onclick="openAddGrade()">+ Add Grade</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Grades for ${myClass}</h3></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Student</th><th>Subject</th><th>Term</th><th>Score</th><th>Grade</th><th>Action</th></tr></thead>
            <tbody>
              ${gl.length===0?'<tr><td colspan="7" class="no-data">No grades yet. Click + Add Grade.</td></tr>'
                :gl.map((g,i)=>`<tr>
                  <td class="td-muted">${i+1}</td>
                  <td><strong>${g.student_name}</strong></td>
                  <td>${g.subject}</td>
                  <td>${g.term}</td>
                  <td><div class="score-bar"><div class="bar-track"><div class="bar-fill" style="width:${g.score}%;background:${gradeBarColor(g.grade)}"></div></div><span>${g.score}</span></div></td>
                  <td>${gradeBadge(g.grade)}</td>
                  <td><button class="btn btn-danger-soft btn-sm" onclick="deleteGradeT('${g.id}')">Del</button></td>
                </tr>`).join('')
              }
            </tbody>
          </table>
        </div>
      </div>`
    }`;
}

function openAddGrade() {
  const yr=new Date().getFullYear();
  openModal('📝 Add Grade', `
    <div class="form-group"><label>Student *</label>
      <select class="form-control" id="tg-stu">
        <option value="">— Select —</option>
        ${myStudents.map(s=>`<option value="${s.id}" data-name="${s.first_name} ${s.last_name}" data-sid="${s.student_id}" data-cls="${s.class}">${s.first_name} ${s.last_name}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Subject *</label>
      <select class="form-control" id="tg-sub">
        <option value="">Select Subject</option>
        ${['Mathematics','English Language','Sciences','Social Studies','ICT','French','Fine Arts','Physical Education','Economics','Literature','Government','Commerce'].map(s=>`<option>${s}</option>`).join('')}
      </select>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Term *</label>
        <select class="form-control" id="tg-term">
          <option value="">Select</option>
          <option>Term 1</option><option>Term 2</option><option>Term 3</option>
        </select>
      </div>
      <div class="form-group"><label>Session</label>
        <input class="form-control" id="tg-ses" value="${yr+'/'+(yr+1)}"/>
      </div>
      <div class="form-group"><label>Score (0-100) *</label>
        <input class="form-control" type="number" id="tg-score" min="0" max="100"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn btn-red" onclick="saveGradeT()">Save Grade</button>
      <button class="btn btn-gray" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function saveGradeT() {
  const stuSel=document.getElementById('tg-stu');
  const stuId=stuSel.value;
  const sub=document.getElementById('tg-sub').value;
  const term=document.getElementById('tg-term').value;
  const ses=document.getElementById('tg-ses').value;
  const score=Number(document.getElementById('tg-score').value);
  if(!stuId){toast('Select a student.','error');return;}
  if(!sub){toast('Select a subject.','error');return;}
  if(!term){toast('Select a term.','error');return;}
  if(isNaN(score)||score<0||score>100){toast('Score must be 0-100.','error');return;}
  const opt=stuSel.options[stuSel.selectedIndex];
  const {error}=await sb.from('grades').insert([{
    student_id:stuId,
    student_name:opt.getAttribute('data-name'),
    student_code:opt.getAttribute('data-sid'),
    class:opt.getAttribute('data-cls'),
    subject:sub,term,session:ses,score,
    grade:scoreToGrade(score),date_added:todayDate()
  }]);
  if(error){toast('Error: '+error.message,'error');return;}
  toast('Grade saved!','success');
  closeModal();
  renderGrades();
}

async function deleteGradeT(id) {
  if(!confirm('Delete this grade?')) return;
  await sb.from('grades').delete().eq('id',id);
  toast('Deleted.','error');
  renderGrades();
}

/* ══ NOTICES ═══════════════════════════════════════════════ */
async function renderNotices() {
  const {data}=await sb.from('notices').select('*').order('created_at',{ascending:false});
  document.getElementById('sec-notices').innerHTML=`
    <div class="page-header"><div class="page-title">📢 Notices</div></div>
    <div class="card card-body">
      ${(data||[]).length===0?emptyState('📢','No notices yet.')
        :(data||[]).map(n=>`
          <div style="padding:14px 0;border-bottom:1px solid #f5f5f5">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <strong style="font-size:14px">${n.title}</strong>
              ${pill(n.priority)}
            </div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:6px">📅 ${n.date} &nbsp;·&nbsp; 👤 ${n.author||'Admin'}</div>
            <div style="font-size:13px;color:#444;line-height:1.6">${n.body}</div>
          </div>`).join('')
      }
    </div>`;
}

/* ══ PROFILE ═══════════════════════════════════════════════ */

init();
</script>
