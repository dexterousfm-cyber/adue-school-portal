<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal — ADUE International Schools</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
/* ═══════════════════════════════════════════════════════════
   ADUE INTERNATIONAL SCHOOLS — Global Stylesheet
   Matches exact design from screenshots
═══════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

:root {
  --sidebar-bg:   #7B0000;
  --sidebar-dark: #4A0000;
  --topbar-bg:    #8B0000;
  --active-bg:    #A00000;
  --red-btn:      #8B0000;
  --green-btn:    #28a745;
  --white:        #ffffff;
  --light-bg:     #f4f4f4;
  --card-border:  #8B0000;
  --text-dark:    #222222;
  --text-muted:   #666666;
  --text-red:     #8B0000;
  --border:       #dddddd;
  --table-head:   #8B0000;
  --danger:       #dc3545;
  --warning:      #ffc107;
  --success:      #28a745;
  --sidebar-w:    185px;
  --topbar-h:     54px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--light-bg);
  color: var(--text-dark);
  font-size: 13px;
}
a { text-decoration: none; color: inherit; }
button { font-family: 'Poppins', sans-serif; cursor: pointer; }
input, select, textarea { font-family: 'Poppins', sans-serif; }

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--topbar-bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px 0 0;
  z-index: 300;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.topbar-brand {
  width: var(--sidebar-w);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  flex-shrink: 0;
}
.topbar-brand .logo-box {
  width: 36px; height: 36px;
  background: var(--white);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.topbar-brand .brand-text {
  font-size: 13px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}
.topbar-brand .brand-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.65);
  font-weight: 400;
}
.topbar-center {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  padding-left: 20px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-admin {
  text-align: right;
}
.topbar-admin .admin-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.2;
}
.topbar-admin .admin-role {
  font-size: 10px;
  color: rgba(255,255,255,0.65);
}
.btn-logout {
  padding: 6px 14px;
  background: var(--danger);
  border: none;
  border-radius: 4px;
  color: var(--white);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-logout:hover { opacity: 0.85; }

/* ── LAYOUT ──────────────────────────────────────────────── */
.layout {
  display: flex;
  padding-top: var(--topbar-h);
  min-height: 100vh;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-height: calc(100vh - var(--topbar-h));
  background: linear-gradient(180deg, var(--sidebar-bg) 0%, var(--sidebar-dark) 100%);
  position: fixed;
  top: var(--topbar-h);
  left: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 200;
}
.sidebar nav {
  padding: 10px 0;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 11px 18px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.82);
  font-size: 13px;
  font-weight: 400;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  border-left: 3px solid transparent;
}
.nav-item:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.nav-item.active {
  background: var(--active-bg);
  color: #fff;
  font-weight: 600;
  border-left-color: #fff;
}
.nav-icon { font-size: 16px; width: 20px; text-align: center; }

/* ── MAIN CONTENT ────────────────────────────────────────── */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 24px 22px;
  min-height: calc(100vh - var(--topbar-h));
  background: var(--light-bg);
}

/* ── PAGE HEADER ─────────────────────────────────────────── */
.page-header {
  margin-bottom: 20px;
}
.back-link {
  font-size: 12px;
  color: var(--text-muted);
  display: inline-block;
  margin-bottom: 6px;
  cursor: pointer;
  text-decoration: none;
}
.back-link:hover { color: var(--text-red); }
.page-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-red);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── STAT CARDS ──────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 22px;
}
.stat-card {
  background: var(--white);
  border-radius: 8px;
  padding: 18px 16px;
  border-top: 3px solid var(--card-border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.stat-card .stat-val {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-red);
  line-height: 1.1;
}
.stat-card .stat-lbl {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-card.green { border-top-color: var(--success); }
.stat-card.green .stat-val { color: var(--success); }
.stat-card.blue  { border-top-color: #007bff; }
.stat-card.blue  .stat-val { color: #007bff; }
.stat-card.gold  { border-top-color: #e6a817; }
.stat-card.gold  .stat-val { color: #b07d00; }

/* ── CARDS ───────────────────────────────────────────────── */
.card {
  background: var(--white);
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  margin-bottom: 20px;
  overflow: hidden;
}
.card-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.card-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  display: flex;
  align-items: center;
  gap: 6px;
  border-left: 3px solid var(--text-red);
  padding-left: 10px;
}
.card-body { padding: 18px; }

/* ── SECTION TITLE ───────────────────────────────────────── */
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── TABLE ───────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
thead tr {
  background: var(--table-head);
}
th {
  padding: 10px 14px;
  text-align: left;
  color: var(--white);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
td {
  padding: 10px 14px;
  border-bottom: 1px solid #f0f0f0;
  color: var(--text-dark);
  vertical-align: middle;
}
tbody tr:hover { background: #fef5f5; }
tbody tr:last-child td { border-bottom: none; }
.td-muted { color: var(--text-muted); font-size: 11px; }
.no-data {
  text-align: center;
  padding: 32px;
  color: var(--text-muted);
  font-size: 13px;
}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 16px;
  border-radius: 4px;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn:hover { opacity: 0.88; }
.btn-red   { background: var(--red-btn);   color: var(--white); }
.btn-green { background: var(--green-btn); color: var(--white); }
.btn-gray  { background: #e0e0e0; color: #444; }
.btn-danger-soft { background: #fde8e8; color: var(--danger); border: 1px solid #f5c6c6; }
.btn-danger-soft:hover { background: #f5c6c6; }
.btn-edit-soft { background: #eaf0fb; color: #1a5276; border: 1px solid #c5d8f0; }
.btn-edit-soft:hover { background: #c5d8f0; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-block { width: 100%; justify-content: center; padding: 11px; font-size: 13px; }

/* ── QUICK ACTIONS ───────────────────────────────────────── */
.quick-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.quick-actions span {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-red);
  border-left: 3px solid var(--text-red);
  padding-left: 10px;
}

/* ── FORM ────────────────────────────────────────────────── */
.form-section {
  background: var(--white);
  border-radius: 8px;
  padding: 22px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.form-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-red);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-grid.cols-1 { grid-template-columns: 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dark);
}
.form-group label .req { color: var(--danger); margin-left: 2px; }
.form-control {
  width: 100%;
  padding: 8px 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  color: var(--text-dark);
  background: var(--white);
  outline: none;
  transition: border 0.2s;
}
.form-control:focus { border-color: var(--card-border); }
.form-control::placeholder { color: #bbb; }
.form-hint {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}
textarea.form-control { resize: vertical; min-height: 80px; }

/* ── PILL / BADGE ────────────────────────────────────────── */
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.pill-green  { background: #d4edda; color: #155724; }
.pill-red    { background: #fde8e8; color: #721c24; }
.pill-yellow { background: #fff3cd; color: #856404; }
.pill-blue   { background: #cce5ff; color: #004085; }
.pill-gray   { background: #e9ecef; color: #495057; }

.grade-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}
.g-A { background: #d4edda; color: #155724; }
.g-B { background: #cce5ff; color: #004085; }
.g-C { background: #fff3cd; color: #856404; }
.g-D { background: #ffe5cc; color: #7d4000; }
.g-F { background: #fde8e8; color: #721c24; }

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 600;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--white);
  border-radius: 8px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  max-height: 90vh;
  overflow-y: auto;
  animation: fadeUp 0.2s ease;
  border-top: 4px solid var(--card-border);
}
.modal-box.wide { max-width: 640px; }
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.modal-header h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-red);
}
.modal-close {
  background: none;
  border: none;
  font-size: 20px;
  color: var(--text-muted);
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
}
.modal-close:hover { background: #f0f0f0; }

/* ── ALERT ───────────────────────────────────────────────── */
.alert {
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 12px;
  margin-bottom: 14px;
  display: none;
}
.alert.show { display: block; }
.alert-success { background: #d4edda; color: #155724; border-left: 3px solid #28a745; }
.alert-danger  { background: #fde8e8; color: #721c24; border-left: 3px solid #dc3545; }
.alert-info    { background: #cce5ff; color: #004085; border-left: 3px solid #007bff; }

/* ── TOAST ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: #333;
  color: #fff;
  padding: 11px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  max-width: 300px;
  animation: fadeUp 0.3s ease;
}
#toast.success { background: var(--success); }
#toast.error   { background: var(--danger); }

/* ── SETUP SCREEN ────────────────────────────────────────── */
#setup-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--sidebar-bg), var(--sidebar-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.setup-card {
  background: var(--white);
  border-radius: 10px;
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  border-top: 5px solid var(--card-border);
  animation: fadeUp 0.4s ease;
}
.setup-logo {
  text-align: center;
  margin-bottom: 28px;
}
.setup-logo .logo-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.setup-logo h2 { font-size: 22px; font-weight: 700; color: var(--text-red); }
.setup-logo p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ── LOGIN SCREEN ────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--sidebar-bg), var(--sidebar-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--white);
  border-radius: 10px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  border-top: 5px solid var(--card-border);
  animation: fadeUp 0.4s ease;
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo .logo-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.login-logo h2 { font-size: 22px; font-weight: 700; color: var(--text-red); }
.login-logo p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.login-title   { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 20px; text-align: center; }
#login-err, #setup-err {
  font-size: 12px;
  color: var(--danger);
  text-align: center;
  min-height: 18px;
  margin-bottom: 10px;
  font-weight: 500;
}
.input-eye { position: relative; }
.input-eye .form-control { padding-right: 38px; }
.eye-btn {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; font-size: 15px; color: var(--text-muted);
}
.eye-btn:hover { color: var(--text-red); }

/* ── SCORE BAR ───────────────────────────────────────────── */
.score-bar { display: flex; align-items: center; gap: 7px; }
.bar-track  { width: 60px; height: 5px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
.bar-fill   { height: 100%; border-radius: 3px; }

/* ── ATTENDANCE BUTTONS ──────────────────────────────────── */
.att-btns { display: flex; gap: 4px; }
.att-btn {
  padding: 3px 9px; border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent; cursor: pointer;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  transition: all 0.15s;
}
.att-btn.active-present { background: #d4edda; color: #155724; border-color: #b1dfbb; }
.att-btn.active-absent  { background: #fde8e8; color: #721c24; border-color: #f5c6c6; }
.att-btn.active-late    { background: #fff3cd; color: #856404; border-color: #ffe69c; }

/* ── PHOTO UPLOAD ────────────────────────────────────────── */
.photo-upload {
  border: 2px dashed var(--border);
  border-radius: 6px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  transition: border-color 0.2s;
}
.photo-upload:hover { border-color: var(--card-border); color: var(--text-red); }
.photo-preview {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--card-border);
  display: block; margin: 0 auto 8px;
}

/* ── SETTINGS ────────────────────────────────────────────── */
.settings-block {
  background: var(--white);
  border-radius: 8px;
  padding: 22px;
  margin-bottom: 18px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  max-width: 520px;
}
.settings-block h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-red);
  margin-bottom: 4px;
}
.settings-block p {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid #f0f0f0;
}

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}
.fade-in { animation: fadeUp 0.35s ease; }

/* ── UTILITIES ───────────────────────────────────────────── */
.text-red    { color: var(--text-red); }
.text-muted  { color: var(--text-muted); }
.text-center { text-align: center; }
.fw-600      { font-weight: 600; }
.flex        { display: flex; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-8       { gap: 8px; }
.gap-10      { gap: 10px; }
.mt-10       { margin-top: 10px; }
.mt-16       { margin-top: 16px; }
.mb-16       { margin-bottom: 16px; }
.naira::before { content: '₦'; }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar { transform: translateX(-185px); width: 185px; transition: transform 0.3s; }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; padding: 16px 14px; }
  .topbar-brand { width: auto; }
  .topbar-center { display: none; }
  .form-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .menu-toggle { display: flex !important; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; }
  .sidebar-overlay.open { display: block; }
}
.menu-toggle {
  display: none;
  background: transparent;
  border: none;
  color: var(--white);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
}

  .s-nav a{display:flex;align-items:center;gap:10px;padding:11px 16px;color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;border-left:3px solid transparent;transition:all 0.15s;cursor:pointer;}
  .s-nav a:hover{background:rgba(255,255,255,0.08);color:#fff;}
  .s-nav a.active{background:rgba(212,175,55,0.2);color:#F0C040;border-left-color:#D4AF37;font-weight:600;}
  .subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-top:10px;}

function spill(s){
  const m={Active:['#155724','#d4edda'],Present:['#155724','#d4edda'],Paid:['#155724','#d4edda'],
    Absent:['#721c24','#fde8e8'],Inactive:['#721c24','#fde8e8'],Unpaid:['#721c24','#fde8e8'],
    Late:['#856404','#fff3cd'],Partial:['#856404','#fff3cd'],
    High:['#721c24','#fde8e8'],Medium:['#856404','#fff3cd'],Low:['#004085','#cce5ff']};
  const [c,b]=m[s]||['#495057','#e9ecef'];
  return '<span style="background:'+b+';color:'+c+';padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;">'+s+'</span>';
}
function gbadge(g){

  const [c,b]=m[g]||['#495057','#e9ecef'];
  return '<span style="background:'+b+';color:'+c+';padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;">'+g+'</span>';
}
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=type==='err'?'#dc3545':'#28a745';
  el.style.display='block'; clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',3200);
}

/* ─── AUTH ─── */

if(!RAW){ window.location.href='index.html'; }
let SESSION; try{ SESSION=JSON.parse(RAW); }catch(e){ window.location.href='index.html'; }
if(!SESSION||SESSION.role!=='student'){ window.location.href='index.html'; }

async function loadMe(){
  const {data,error} = await sb.from('students').select('*').eq('id',SESSION.id).single();
  if(error||!data){ window.location.href='index.html'; return; }
  ME=data;
  document.getElementById('hdr-name').textContent  = ME.first_name+' '+ME.last_name;

}

function logout(){ sessionStorage.removeItem('adue_session'); window.location.href='index.html'; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

function show(page){
  document.querySelectorAll('[id^="page-"]').forEach(d=>d.style.display='none');
  document.getElementById('page-'+page).style.display='';
  document.querySelectorAll('.s-nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  ({dashboard:renderDashboard,subjects:renderSubjects,results:renderResults,
    attendance:renderAttendance,fees:renderFees,notices:renderNotices,profile:renderProfile})[page]();
}

/* ─── DASHBOARD ─── */
async function renderDashboard(){
  const el=document.getElementById('page-dashboard');
  el.innerHTML='<div style="text-align:center;padding:40px;color:#666">Loading...</div>';
  const [gR,aR,fR,nR,sR]=await Promise.all([
    sb.from('grades').select('score,subject,term,grade').eq('student_id',ME.id).order('created_at',{ascending:false}).limit(5),
    sb.from('attendance').select('status').eq('student_id',ME.id),
    sb.from('fees').select('amount,paid').eq('student_id',ME.id),
    sb.from('notices').select('title,priority,date').order('created_at',{ascending:false}).limit(5),
    sb.from('subject_registrations').select('subject,term').eq('student_id',ME.id).eq('session',curSes()),
  ]);
  const grades=gR.data||[],att=aR.data||[],fees=fR.data||[],notices=nR.data||[],subs=sR.data||[];
  const avg=grades.length?Math.round(grades.reduce((a,b)=>a+b.score,0)/grades.length):0;
  const pres=att.filter(a=>a.status==='Present').length;
  const paid=fees.reduce((a,b)=>a+(b.paid||0),0);

  let warn='';
  if(subs.length===0){
    warn='<div style="background:#fff3cd;border:1px solid #ffeeba;border-radius:8px;padding:14px 18px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">'
      +'<div><div style="font-size:13px;font-weight:600;color:#856404">&#128218; You have not registered your subjects yet!</div>'
      +'<div style="font-size:12px;color:#856404;margin-top:2px">Register subjects for the current term.</div></div>'
      +'<button onclick="show(\'subjects\')" style="padding:8px 16px;background:#8B0000;color:#fff;border:none;border-radius:5px;font-family:\'Poppins\',sans-serif;font-weight:600;cursor:pointer;font-size:12px;">Register Now &rarr;</button>'
      +'</div>';
  }

  const gRows=grades.length===0?empty('📊','No results yet.')
    :grades.map(g=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #f5f5f5">'
      +'<div><div style="font-size:13px;font-weight:600">'+g.subject+'</div><div style="font-size:11px;color:#666">'+g.term+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px">'+gbadge(g.grade)+'<span style="font-size:12px;color:#666">'+g.score+'</span></div></div>').join('');

  const nRows=notices.length===0?empty('📢','No notices yet.')

      +'<div><div style="font-size:13px;font-weight:600">'+n.title+'</div><div style="font-size:11px;color:#666">'+n.date+'</div></div>'
      +spill(n.priority)+'</div>').join('');

  el.innerHTML='<div class="page-header"><div class="page-title">&#127968; Dashboard</div>'
    +'<div style="font-size:12px;color:#666;margin-top:4px">Welcome back, '+ME.first_name+'!</div></div>'
    +warn
    +'<div class="stats-row">'
    +'<div class="stat-card blue"><div class="stat-val">'+avg+'%</div><div class="stat-lbl">My Average</div></div>'
    +'<div class="stat-card green"><div class="stat-val">'+pres+'</div><div class="stat-lbl">Days Present</div></div>'
    +'<div class="stat-card gold"><div class="stat-val">'+subs.length+'</div><div class="stat-lbl">Subjects Registered</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+naira(paid)+'</div><div class="stat-lbl">Fees Paid</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">'
    +'<div class="card"><div class="card-header"><h3>&#128202; Recent Results</h3></div><div style="padding:0">'+gRows+'</div></div>'
    +'<div class="card"><div class="card-header"><h3>&#128226; Notices</h3></div><div style="padding:0">'+nRows+'</div></div>'
    +'</div>';
}

/* ─── SUBJECTS ─── */
async function renderSubjects(){
  subTerm='Term 1';
  await loadSubjectPage();
}

async function loadSubjectPage(){
  const el=document.getElementById('page-subjects');
  const {data}=await sb.from('subject_registrations').select('subject')
    .eq('student_id',ME.id).eq('term',subTerm).eq('session',curSes());
  selectedSubs=new Set((data||[]).map(r=>r.subject));

  el.innerHTML='<div class="page-header"><div class="page-title">&#128218; Subject Registration</div>'
    +'<div style="font-size:12px;color:#666;margin-top:4px">Select your subjects for '+curSes()+'</div></div>'
    // term tabs
    +'<div style="display:flex;gap:0;margin-bottom:18px;border:1px solid #ddd;border-radius:6px;overflow:hidden;max-width:320px">'
    +['Term 1','Term 2','Term 3'].map(t=>'<button id="ttab-'+t.replace(' ','')+'" onclick="switchSubTerm(\''+t+'\')"'
      +' style="flex:1;padding:9px;border:none;font-family:\'Poppins\',sans-serif;font-size:12px;font-weight:600;cursor:pointer;background:'+(t===subTerm?'#8B0000':'#f9f9f9')+';color:'+(t===subTerm?'#fff':'#666')+';border-right:1px solid #ddd;">'+t+'</button>').join('')
    +'</div>'
    // registered summary
    +'<div class="card" style="margin-bottom:16px"><div class="card-header"><h3>&#10003; Registered for '+subTerm+'</h3><span id="sub-count" style="font-size:12px;color:#666">'+selectedSubs.size+' selected</span></div>'
    +'<div class="card-body" id="reg-summary">'+buildSummary()+'</div></div>'
    // picker
    +'<div class="card"><div class="card-header"><h3>&#128203; Pick Subjects</h3></div><div class="card-body">'
    +'<div style="background:#fdf0f0;border-radius:6px;padding:10px;margin-bottom:14px;font-size:13px;color:#8B0000">Tap to select or deselect. Press Save when done.</div>'
    +'<div style="font-size:13px;font-weight:700;color:#8B0000;margin-bottom:8px">&#128204; Core Subjects (Compulsory)</div>'
    +'<div class="subject-grid" id="core-grid">'+buildCards(CORE)+'</div>'
    +'<div style="font-size:13px;font-weight:700;color:#8B0000;margin:16px 0 8px">&#128216; Elective Subjects (Optional)</div>'
    +'<div class="subject-grid" id="elec-grid">'+buildCards(ELEC)+'</div>'
    +'<div style="margin-top:18px;display:flex;gap:10px">'
    +'<button onclick="saveSubjects()" style="padding:10px 22px;background:#8B0000;color:#fff;border:none;border-radius:5px;font-family:\'Poppins\',sans-serif;font-weight:600;cursor:pointer;font-size:13px;">&#10004; Save Registration</button>'
    +'<button onclick="clearAll()" style="padding:10px 18px;background:#e0e0e0;color:#444;border:none;border-radius:5px;font-family:\'Poppins\',sans-serif;font-weight:600;cursor:pointer;font-size:13px;">&#10005; Clear All</button>'
    +'</div></div></div>';
}

function buildSummary(){
  if(selectedSubs.size===0) return '<div style="color:#666;font-size:13px">No subjects registered for '+subTerm+'. Select below and save.</div>';
  return '<div style="display:flex;flex-wrap:wrap;gap:8px">'
    +[...selectedSubs].map(s=>'<span style="background:#d4edda;color:#155724;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500">&#10004; '+s+'</span>').join('')
    +'</div><div style="margin-top:8px;font-size:12px;color:#666">'+selectedSubs.size+' subject(s) registered for '+subTerm+' — '+curSes()+'</div>';
}

function buildCards(list){
  return list.map(s=>{
    const sel=selectedSubs.has(s);
    return '<div class="sub-card'+(sel?' sel':'')+'" onclick="toggleSub(\''+s+'\')"><div class="chk">'+(sel?'&#10004;':'')+'</div><div style="font-size:13px;font-weight:500;color:#333">'+s+'</div></div>';
  }).join('');
}

function toggleSub(s){ selectedSubs.has(s)?selectedSubs.delete(s):selectedSubs.add(s); refreshCards(); }
function clearAll(){ selectedSubs.clear(); refreshCards(); }

function refreshCards(){
  const cg=document.getElementById('core-grid');
  const eg=document.getElementById('elec-grid');
  const ct=document.getElementById('sub-count');
  const rs=document.getElementById('reg-summary');
  if(cg) cg.innerHTML=buildCards(CORE);
  if(eg) eg.innerHTML=buildCards(ELEC);
  if(ct) ct.textContent=selectedSubs.size+' selected';
  if(rs) rs.innerHTML=buildSummary();
}

async function switchSubTerm(term){
  subTerm=term;
  // update tab styles
  ['Term 1','Term 2','Term 3'].forEach(t=>{
    const btn=document.getElementById('ttab-'+t.replace(' ',''));
    if(btn){ btn.style.background=t===term?'#8B0000':'#f9f9f9'; btn.style.color=t===term?'#fff':'#666'; }
  });
  const {data}=await sb.from('subject_registrations').select('subject')
    .eq('student_id',ME.id).eq('term',subTerm).eq('session',curSes());
  selectedSubs=new Set((data||[]).map(r=>r.subject));
  refreshCards();
}

async function saveSubjects(){
  if(selectedSubs.size===0){ toast('Select at least one subject.','err'); return; }
  await sb.from('subject_registrations').delete()
    .eq('student_id',ME.id).eq('term',subTerm).eq('session',curSes());
  const records=[...selectedSubs].map(subject=>({
    student_id:ME.id, student_name:ME.first_name+' '+ME.last_name,
    class:ME.class, subject, term:subTerm, session:curSes()
  }));
  const {error}=await sb.from('subject_registrations').insert(records);
  if(error){ toast('Error: '+error.message,'err'); return; }
  toast(selectedSubs.size+' subjects saved for '+subTerm+'!','ok');
  refreshCards();
}

/* ─── RESULTS ─── */
async function renderResults(){
  const el=document.getElementById('page-results');
  el.innerHTML='<div style="text-align:center;padding:40px;color:#666">Loading...</div>';
  const {data:grades}=await sb.from('grades').select('*').eq('student_id',ME.id).order('created_at',{ascending:false});
  const gl=grades||[];
  const avg=gl.length?Math.round(gl.reduce((a,b)=>a+b.score,0)/gl.length):0;
  const rows=gl.length===0?'<tr><td colspan="7" class="no-data">No results yet.</td></tr>'
    :gl.map((g,i)=>'<tr><td style="color:#666;font-size:12px">'+(i+1)+'</td>'
      +'<td><strong>'+g.subject+'</strong></td><td>'+g.term+'</td><td>'+(g.session||'—')+'</td>'
      +'<td><div style="display:flex;align-items:center;gap:7px"><div style="width:55px;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="width:'+g.score+'%;height:100%;background:'+gradeColor(g.grade)+';border-radius:3px"></div></div>'+g.score+'</div></td>'
      +'<td>'+gbadge(g.grade)+'</td><td style="font-size:12px;color:#666">'+remark(g.score)+'</td></tr>').join('');
  el.innerHTML='<div class="page-header"><div class="page-title">&#128202; My Results</div><div style="font-size:12px;color:#666">'+gl.length+' records</div></div>'
    +'<div class="card"><div class="card-header"><h3>All Results</h3>'
    +(gl.length>0?'<span style="font-size:13px;color:#666">Average: <strong style="color:#8B0000">'+avg+'% — '+gbadge(gradeFromScore(avg))+'</strong></span>':'')
    +'</div><div class="table-wrap"><table><thead><tr><th>#</th><th>Subject</th><th>Term</th><th>Session</th><th>Score</th><th>Grade</th><th>Remark</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

/* ─── ATTENDANCE ─── */
async function renderAttendance(){
  const {data:att}=await sb.from('attendance').select('*').eq('student_id',ME.id).order('date',{ascending:false});
  const al=att||[];
  const pres=al.filter(a=>a.status==='Present').length;
  const abs=al.filter(a=>a.status==='Absent').length;
  const late=al.filter(a=>a.status==='Late').length;
  const pct=al.length?Math.round((pres/al.length)*100):0;
  const rows=al.length===0?'<tr><td colspan="3" class="no-data">No attendance records yet.</td></tr>'
    :al.map((a,i)=>'<tr><td style="color:#666;font-size:12px">'+(i+1)+'</td><td>'+fmt(a.date)+'</td><td>'+spill(a.status)+'</td></tr>').join('');
  document.getElementById('page-attendance').innerHTML=
    '<div class="page-header"><div class="page-title">&#128203; My Attendance</div></div>'
    +'<div class="stats-row">'
    +'<div class="stat-card green"><div class="stat-val">'+pres+'</div><div class="stat-lbl">Present</div></div>'
    +'<div class="stat-card" style="border-top-color:#dc3545"><div class="stat-val" style="color:#dc3545">'+abs+'</div><div class="stat-lbl">Absent</div></div>'
    +'<div class="stat-card gold"><div class="stat-val">'+late+'</div><div class="stat-lbl">Late</div></div>'
    +'<div class="stat-card blue"><div class="stat-val">'+pct+'%</div><div class="stat-lbl">Attendance Rate</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-header"><h3>Attendance History</h3></div>'
    +'<div class="table-wrap"><table><thead><tr><th>#</th><th>Date</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

/* ─── FEES ─── */
async function renderFees(){
  const {data:fees}=await sb.from('fees').select('*').eq('student_id',ME.id).order('created_at',{ascending:false});
  const fl=fees||[];
  const billed=fl.reduce((a,b)=>a+(b.amount||0),0);
  const paid=fl.reduce((a,b)=>a+(b.paid||0),0);
  const bal=billed-paid;
  const rows=fl.length===0?'<tr><td colspan="9" class="no-data">No fee records yet.</td></tr>'
    :fl.map((f,i)=>'<tr><td style="color:#666;font-size:12px">'+(i+1)+'</td><td>'+f.term+'</td><td>'+(f.session||'—')+'</td><td>'+(f.fee_type||'—')+'</td><td>'+naira(f.amount)+'</td><td style="color:#28a745;font-weight:600">'+naira(f.paid)+'</td><td style="color:'+(f.amount-f.paid>0?'#dc3545':'#28a745')+';font-weight:600">'+naira(f.amount-f.paid)+'</td><td>'+spill(feeStatus(f))+'</td><td style="font-size:12px;color:#666">'+fmt(f.date_paid)+'</td></tr>').join('');
  document.getElementById('page-fees').innerHTML=
    '<div class="page-header"><div class="page-title">&#128176; My Fees</div></div>'
    +'<div class="stats-row"><div class="stat-card blue"><div class="stat-val">'+naira(billed)+'</div><div class="stat-lbl">Total Billed</div></div>'
    +'<div class="stat-card green"><div class="stat-val">'+naira(paid)+'</div><div class="stat-lbl">Amount Paid</div></div>'
    +'<div class="stat-card" style="border-top-color:'+(bal>0?'#dc3545':'#28a745')+'"><div class="stat-val" style="color:'+(bal>0?'#dc3545':'#28a745')+'">'+naira(bal)+'</div><div class="stat-lbl">Balance</div></div></div>'
    +'<div class="card"><div class="card-header"><h3>Fee Records</h3></div>'
    +'<div class="table-wrap"><table><thead><tr><th>#</th><th>Term</th><th>Session</th><th>Fee Type</th><th>Amount</th><th>Paid</th><th>Balance</th><th>Status</th><th>Date Paid</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

/* ─── NOTICES ─── */
async function renderNotices(){
  const {data}=await sb.from('notices').select('*').order('created_at',{ascending:false});
  const nl=data||[];
  const items=nl.length===0?empty('📢','No notices yet.')
    :nl.map(n=>'<div style="padding:16px;border-bottom:1px solid #f5f5f5;border-left:4px solid '+(n.priority==='High'?'#dc3545':n.priority==='Low'?'#007bff':'#ffc107')+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><strong style="font-size:14px">'+n.title+'</strong>'+spill(n.priority)+'</div>'
      +'<div style="font-size:11px;color:#666;margin-bottom:6px">'+n.date+'</div>'
      +'<div style="font-size:13px;color:#444;line-height:1.6">'+n.body+'</div></div>').join('');

/* ─── PROFILE ─── */
async function renderProfile(){
  const {data:subs}=await sb.from('subject_registrations').select('subject,term').eq('student_id',ME.id).eq('session',curSes());
  const mySubs=subs||[];
  let subByTerm='';
  ['Term 1','Term 2','Term 3'].forEach(term=>{
    const ts=mySubs.filter(s=>s.term===term);
    if(!ts.length) return;
    subByTerm+='<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:#666;margin-bottom:6px">'+term+'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:6px">'
      +ts.map(s=>'<span style="background:#d4edda;color:#155724;padding:3px 10px;border-radius:20px;font-size:12px;">&#10004; '+s.subject+'</span>').join('')
      +'</div></div>';
  });
  document.getElementById('page-profile').innerHTML=
    '<div class="page-header"><div class="page-title">&#128100; My Profile</div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">'
    // personal info card
    +'<div class="card card-body">'
    +'<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f0f0f0">'
    +'<div style="width:64px;height:64px;border-radius:50%;background:#8B0000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0">'+(ME.first_name||'?')[0]+'</div>'
    +'<div><div style="font-size:17px;font-weight:700;color:#8B0000">'+ME.first_name+' '+ME.last_name+'</div>'
    +'<div style="font-size:13px;color:#666">'+ME.class+(ME.department?' — '+ME.department:'')+'</div>'
    +'<div style="font-size:12px;color:#666">'+ME.student_id+'</div></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">'
    +'<div><span style="color:#666">Student ID:</span> <strong>'+ME.student_id+'</strong></div>'
    +'<div><span style="color:#666">Class:</span> <strong>'+ME.class+'</strong></div>'
    +'<div><span style="color:#666">Gender:</span> <strong>'+(ME.gender||'—')+'</strong></div>'
    +'<div><span style="color:#666">Date of Birth:</span> <strong>'+(ME.dob?fmt(ME.dob):'—')+'</strong></div>'
    +'<div><span style="color:#666">Email:</span> <strong>'+(ME.email||'—')+'</strong></div>'
    +'<div><span style="color:#666">Phone:</span> <strong>'+(ME.phone||'—')+'</strong></div>'
    +'<div><span style="color:#666">Parent/Guardian:</span> <strong>'+(ME.parent_name||'—')+'</strong></div>'
    +'<div><span style="color:#666">Parent Phone:</span> <strong>'+(ME.parent_phone||'—')+'</strong></div>'
    +(ME.department?'<div><span style="color:#666">Department:</span> <strong>'+ME.department+'</strong></div>':'')
    +'<div><span style="color:#666">Username:</span> <strong>'+(ME.portal_username||'—')+'</strong></div>'
    +'</div></div>'
    // subjects card
    +'<div class="card card-body">'
    +'<div style="font-size:14px;font-weight:700;color:#8B0000;margin-bottom:14px">&#128218; My Subjects ('+curSes()+')</div>'
    +(mySubs.length===0
      ?'<div style="color:#666;font-size:13px">No subjects registered yet.<br><br><button onclick="show(\'subjects\')" style="padding:8px 16px;background:#8B0000;color:#fff;border:none;border-radius:5px;font-family:\'Poppins\',sans-serif;font-weight:600;cursor:pointer;font-size:12px;">Register Subjects &rarr;</button></div>'
      :subByTerm)
    +'</div></div>';
}

loadMe();
